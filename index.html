<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的第一个免费网页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">GitHub Pages 免费部署示例</p>
        <h1>你好，我是周小瑜</h1>
        <p class="intro">
          这是我的第一个免费上线网页。你可以把这里改成个人介绍、项目介绍、
          公司主页、产品展示页或文章入口。
        </p>
        <div class="actions">
          <a class="button primary" href="#contact">联系我</a>
          <a class="button secondary" href="#work">查看内容</a>
        </div>
      </section>

      <section id="work" class="section">
        <h2>可以放什么内容</h2>
        <div class="grid">
          <article class="card">
            <h3>个人介绍</h3>
            <p>放你的姓名、职业方向、擅长领域、过往经历。</p>
          </article>
          <article class="card">
            <h3>项目展示</h3>
            <p>展示保险研究、数据分析、网页工具或其他作品。</p>
          </article>
          <article class="card">
            <h3>联系方式</h3>
            <p>放微信、邮箱、公众号、GitHub 或其他社交账号。</p>
          </article>
        </div>
      </section>

      <section id="contact" class="section contact">
        <h2>联系我</h2>
        <p>邮箱：2064023431@qq.com</p>
        <p>GitHub：Kyo_Zhou</p>
      </section>
    </main>
  </body>
</html>
